        // ==========================================
        // FUNCIONES DE RENDERIZADO Y PAGINACIÓN

        let currentClientRows = []; 
        let currentPage = 1;
        const itemsPerPage = 8;

        function renderTablePage(page) {
            if (currentClientRows.length === 0) return;
            
            const totalItems = currentClientRows.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            // Validaciones de límites
            currentPage = page;
            if(currentPage < 1) currentPage = 1;
            if(currentPage > totalPages) currentPage = totalPages;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, totalItems);
            const rowsToShow = currentClientRows.slice(startIndex, endIndex);

            // 1. Renderizar Filas
            const tbody = document.getElementById('cuerpoTablaIzquierda');
            tbody.innerHTML = ''; 
            rowsToShow.forEach((fila) => {
                const tr = document.createElement('tr');
                if(fila.campana !== "null") {
                    tr.setAttribute('data-campaign', fila.campana);
                }
                tr.innerHTML = `
                    <td>${fila.linea}</td>
                    <td>${fila.cuenta}</td>
                    <td>${fila.contrato}</td>
                    <td>${fila.texto}</td>
                `;
                tbody.appendChild(tr);
            });

            // 2. Actualizar texto de elementos
            document.getElementById('textoPaginacion').innerText = `Mostrando ${startIndex + 1} a ${endIndex} de ${totalItems} elementos`;

            // 3. Renderizar Controles de Paginación
            const controlesPaginacion = document.getElementById('controlesPaginacion');
            controlesPaginacion.innerHTML = `
                <a class="page-btn" onclick="renderTablePage(${currentPage - 1})">Anterior</a>
                <a class="page-btn ${currentPage === 1 ? 'active' : ''}" onclick="renderTablePage(1)">1</a>
                <a class="page-btn ${currentPage === 2 ? 'active' : ''}" onclick="renderTablePage(2)">2</a>
                <a class="page-btn" onclick="renderTablePage(${currentPage + 1})">Siguiente</a>
            `;

            activarClicsFilas();

            // Auto-click en la primera fila válida de la página actual
            const primeraFilaValida = document.querySelector('#tablaIzquierda tbody tr[data-campaign]');
            if(primeraFilaValida) {
                primeraFilaValida.click();
            }
        }

        function cargarDatosCliente(datosCliente, tipoBusqueda) {
            document.getElementById('clienteNombre').innerText = datosCliente.nombre;
            document.getElementById('clienteDoc').innerText = datosCliente.doc;
            
            // Asignar el arreglo correcto según lo que ingresó el usuario
            if (tipoBusqueda === 'linea') {
                currentClientRows = datosCliente.filasLinea;
            } else {
                currentClientRows = datosCliente.filasDni;
            }

            // Siempre iniciamos en la página 1 al buscar
            renderTablePage(1); 
        }

        function renderTablaDerecha(idCampana) {
            const tabla = document.getElementById('tablaDerecha');
            const data = dbCampanas[idCampana];
            if(!data) {
                tabla.innerHTML = "";
                return;
            }

            let bgColor = "#D31245"; let textColor = "#ffffff";
            if (data.tema === "green") { bgColor = "#00a650"; }
            if (data.tema === "yellow") { bgColor = "#ffcc00"; textColor = "#000000"; }

            let html = `<thead><tr>
                <th style="background-color: ${bgColor}; color: ${textColor}; padding: 15px;">${data.categoria}</th>
                <th style="background-color: ${bgColor}; color: ${textColor}; font-weight:normal; font-size:18px; padding: 15px;">
                    <strong style="font-weight:bold">${data.titulo}</strong>
                </th>
            </tr></thead><tbody>`;
            
            data.detalles.forEach(item => {
                html += `<tr><td>${item.label}</td><td>${item.value}</td></tr>`;
            });
            html += `</tbody>`;
            tabla.innerHTML = html;
        }

        function activarClicsFilas() {
            const filas = document.querySelectorAll('#tablaIzquierda tbody tr');
            filas.forEach(fila => {
                fila.addEventListener('click', function() {
                    const idCampana = this.getAttribute('data-campaign');
                    if(idCampana && idCampana !== "null") {
                        filas.forEach(f => f.classList.remove('active'));
                        this.classList.add('active');
                        renderTablaDerecha(idCampana);
                    }
                });
            });
        }
