        // ==========================================
        // FUNCIONES DE RENDERIZADO
        // ==========================================

        function cargarDatosCliente(datosCliente) {
            document.getElementById('clienteNombre').innerText = datosCliente.nombre;
            document.getElementById('clienteDoc').innerText = datosCliente.doc;

            const tbody = document.getElementById('cuerpoTablaIzquierda');
            tbody.innerHTML = ''; 

            datosCliente.filas.forEach((fila) => {
                const tr = document.createElement('tr');
                if(fila.campana !== "null") {
                    tr.setAttribute('data-campaign', fila.campana);
                }
                tr.innerHTML = `
                    <td>${fila.linea}</td>
                    <td>${fila.cuenta}</td>
                    <td>${fila.contrato}</td>
                    <td>${fila.texto}</td>
                `;
                tbody.appendChild(tr);
            });

            // Actualizar el texto de paginación automáticamente
            document.getElementById('textoPaginacion').innerText = `Mostrando 1 a ${datosCliente.filas.length} de ${datosCliente.filas.length} elementos`;

            activarClicsFilas();

            // Clickea la primera fila automáticamente al buscar
            const primeraFilaValida = document.querySelector('#tablaIzquierda tbody tr[data-campaign]');
            if(primeraFilaValida) {
                primeraFilaValida.click();
            }
        }

        function renderTablaDerecha(idCampana) {
            const tabla = document.getElementById('tablaDerecha');
            const data = dbCampanas[idCampana];
            if(!data) {
                tabla.innerHTML = "";
                return;
            }

            let bgColor = "#D31245"; let textColor = "#ffffff";
            if (data.tema === "green") { bgColor = "#28a745"; }
            if (data.tema === "yellow") { bgColor = "#ffc107"; textColor = "#000000"; }

            let html = `<thead><tr>
                <th style="background-color: ${bgColor}; color: ${textColor};">${data.categoria}</th>
                <th style="background-color: ${bgColor}; color: ${textColor}; font-weight:normal; font-size:16px;">
                    <strong style="font-weight:bold">${data.titulo}</strong>
                </th>
            </tr></thead><tbody>`;
            
            data.detalles.forEach(item => {
                html += `<tr><td>${item.label}</td><td>${item.value}</td></tr>`;
            });
            html += `</tbody>`;
            tabla.innerHTML = html;
        }

        function activarClicsFilas() {
            const filas = document.querySelectorAll('#tablaIzquierda tbody tr');
            filas.forEach(fila => {
                fila.addEventListener('click', function() {
                    const idCampana = this.getAttribute('data-campaign');
                    if(idCampana && idCampana !== "null") {
                        filas.forEach(f => f.classList.remove('active'));
                        this.classList.add('active');
                        renderTablaDerecha(idCampana);
                    }
                });
            });
        }

        // ==========================================
        // BOTONES DE ACCIÓN
        // ==========================================

        document.getElementById('btnBuscar').addEventListener('click', function() {
            const inputLinea = document.getElementById('inputLinea').value.trim();
            const panel = document.getElementById('panelResultados');

            if (inputLinea === '966310655') {
                panel.style.display = 'block';
                cargarDatosCliente(dataHector);
            } 
            else if (inputLinea === '925485908' || inputLinea === '92548590') {
                panel.style.display = 'block';
                cargarDatosCliente(dataCarla);
            } 
            else {
                alert('Prueba ingresando los números: 966310655 o 925485908');
                panel.style.display = 'none';
            }
        });

        document.getElementById('btnLimpiar').addEventListener('click', function() {
            document.getElementById('panelResultados').style.display = 'none';
            document.getElementById('inputLinea').value = '';
            document.getElementById('inputNroDoc').value = '';
            document.getElementById('inputCuenta').value = '';
            document.getElementById('inputContrato').value = '';
            document.getElementById('inputTipoDoc').selectedIndex = 0;
        });

    </script>
